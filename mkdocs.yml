site_name: ToolWitness
site_description: Detect when AI agents skip tools or fabricate outputs
site_url: https://vcrosby22.github.io/toolwitness
repo_url: https://github.com/vcrosby22/toolwitness
repo_name: vcrosby22/toolwitness

theme:
  name: material
  palette:
    scheme: slate
    primary: blue
    accent: light blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Initialization:
      - End user (first run): initialization-end-user.md
      - Builder (developing ToolWitness): initialization-builder.md
  - How It Works: how-it-works.md
  - Remediation: remediation.md
  - Gallery: gallery.md
  - Multi-Agent Support: multi-agent.md
  - Testing Results: testing-results.md
  - Coverage Model: coverage.md
  - Privacy & Security: privacy.md
  - Why Open Source: why-open-source.md
  - Adapters:
    - OpenAI: adapters/openai.md
    - Anthropic: adapters/anthropic.md
    - LangChain: adapters/langchain.md
    - MCP: adapters/mcp.md
    - CrewAI: adapters/crewai.md
  - Alerting Model: alerting-model.md
  - Commands:
      - Quick reference: command-quick-reference.md
      - CLI Reference (full): cli.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vcrosby22/toolwitness
