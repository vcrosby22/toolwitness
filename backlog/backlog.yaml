    Distinguish legitimate summary from fabrication.
  priority: P2
  status: done
  milestone: v0.1.1
  related: [BUG-02]
  notes: >
    MVP implementation via list-item-aware grouping in structural_match.
    Absent list-item groups treated as omissions. Future: semantic
    similarity for partial list-item mentions.
  tags: [summarization, lists, structural]

