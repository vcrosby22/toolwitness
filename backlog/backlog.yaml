- id: ST-35
  type: story
  parent: EP-05
  title: Structural matching hardening (v0.1.2)
  description: >
    Six fixes to reduce false-positive known limitations from 9 to 3:
    bool isinstance ordering + NL mapping (yes/not/available/disabled),
    month abbreviation normalization (Mar→March), negative number abs()
    fallback, context-aware magnitude scaling (KB/MB/million), implicit
    zero pattern matching ("No errors" for errors=0), and two-pass
    numeric omission reclassification for flat dicts.
  priority: P1
  status: done
  milestone: v0.1.2
  related: [TK-03, BUG-01, BUG-02, BUG-03, BUG-04]
  tags: [verification, structural, false-positives]

